<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Courier expired-stop card hierarchy on phone and desktop</title>
  <desc id="desc">Two wireframes show pending synchronization status first, site and compartment grouped together, assignment age and route-stop ID next, and a pending removal result beside its synchronization label.</desc>
  <rect width="1200" height="700" fill="#f4f7fb"/>
  <text x="60" y="54" fill="#152238" font-family="sans-serif" font-size="28" font-weight="700">Expired-stop card hierarchy</text>
  <text x="60" y="86" fill="#526176" font-family="sans-serif" font-size="16">Illustrative styling. The reference record governs grouping and reading order.</text>

  <text x="100" y="138" fill="#152238" font-family="sans-serif" font-size="20" font-weight="700">Phone</text>
  <rect x="80" y="158" width="360" height="486" rx="32" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
  <rect x="104" y="188" width="312" height="52" rx="12" fill="#e8eef8"/>
  <circle cx="128" cy="214" r="7" fill="#b45309"/>
  <text x="146" y="220" fill="#663c00" font-family="sans-serif" font-size="17" font-weight="700">OFFLINE</text>
  <text x="300" y="220" fill="#663c00" font-family="sans-serif" font-size="17" font-weight="700">PENDING</text>

  <rect x="104" y="260" width="312" height="144" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="128" y="294" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">SITE</text>
  <text x="128" y="326" fill="#152238" font-family="sans-serif" font-size="24" font-weight="700">North Market</text>
  <text x="128" y="364" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">COMPARTMENT</text>
  <rect x="258" y="340" width="130" height="40" rx="10" fill="#dbeafe"/>
  <text x="278" y="367" fill="#1e3a5f" font-family="sans-serif" font-size="20" font-weight="700">B-042</text>

  <text x="104" y="444" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">ASSIGNMENT AGE · STOP CR-1842</text>
  <text x="104" y="477" fill="#152238" font-family="sans-serif" font-size="20">Expired 2 hours ago</text>

  <rect x="104" y="510" width="312" height="92" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="128" y="543" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">REMOVAL RESULT</text>
  <text x="128" y="577" fill="#152238" font-family="sans-serif" font-size="20" font-weight="700">Removed</text>
  <text x="288" y="577" fill="#9a3412" font-family="sans-serif" font-size="16" font-weight="700">NOT SYNCED</text>

  <text x="540" y="138" fill="#152238" font-family="sans-serif" font-size="20" font-weight="700">Desktop</text>
  <rect x="520" y="158" width="600" height="392" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
  <rect x="548" y="188" width="544" height="52" rx="12" fill="#e8eef8"/>
  <circle cx="574" cy="214" r="7" fill="#b45309"/>
  <text x="592" y="220" fill="#663c00" font-family="sans-serif" font-size="17" font-weight="700">OFFLINE</text>
  <text x="970" y="220" fill="#663c00" font-family="sans-serif" font-size="17" font-weight="700">PENDING</text>

  <rect x="548" y="260" width="544" height="112" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="574" y="294" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">SITE</text>
  <text x="574" y="333" fill="#152238" font-family="sans-serif" font-size="25" font-weight="700">North Market</text>
  <line x1="790" y1="280" x2="790" y2="350" stroke="#cbd5e1" stroke-width="2"/>
  <text x="824" y="294" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">COMPARTMENT</text>
  <rect x="824" y="310" width="136" height="42" rx="10" fill="#dbeafe"/>
  <text x="846" y="338" fill="#1e3a5f" font-family="sans-serif" font-size="20" font-weight="700">B-042</text>

  <text x="548" y="412" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">ASSIGNMENT AGE · STOP CR-1842</text>
  <text x="548" y="445" fill="#152238" font-family="sans-serif" font-size="20">Expired 2 hours ago</text>

  <rect x="790" y="392" width="302" height="104" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="814" y="425" fill="#526176" font-family="sans-serif" font-size="14" font-weight="700">REMOVAL RESULT</text>
  <text x="814" y="463" fill="#152238" font-family="sans-serif" font-size="20" font-weight="700">Removed</text>
  <text x="964" y="463" fill="#9a3412" font-family="sans-serif" font-size="16" font-weight="700">NOT SYNCED</text>

  <text x="520" y="594" fill="#526176" font-family="sans-serif" font-size="15">Required order: pending sync state, grouped location, assignment age, result and sync state.</text>
</svg>
